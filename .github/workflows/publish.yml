name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'deepfree.js'
      - 'deepfree.esm.js'
      - 'deepfree.min.js'
      - 'deepfree.d.ts'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
